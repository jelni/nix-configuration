on: "pull_request"

permissions:
  contents: "write"
  pull-requests: "write"

jobs:
  dependabot:
    runs-on: "ubuntu-latest"
    if: "github.actor == 'dependabot[bot]'"
    steps:
      - run: 'gh pr merge --auto --delete-branch --squash "$PR_URL"'
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
